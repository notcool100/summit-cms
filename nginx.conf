server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index home.dc.html;

    location = / {
        try_files /home.dc.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
