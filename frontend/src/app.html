<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link
			rel="icon"
			href="https://summit.us/wp-content/uploads/2022/04/cropped-favico-270x270.png"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Applied before hydration so the saved theme paints on first frame (no flash).
			(function () {
				var KEY = 'summit-theme';
				var THEMES = ['light', 'dark', 'blueprint', 'concrete', 'safety', 'steel'];
				try {
					var saved = localStorage.getItem(KEY);
					if (saved && THEMES.indexOf(saved) > -1 && saved !== 'light') {
						document.documentElement.setAttribute('data-theme', saved);
					}
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
