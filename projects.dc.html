<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>(function(){var KEY="summit-theme";var THEMES=["light","dark","blueprint","concrete","safety","steel"];var saved=localStorage.getItem(KEY);if(saved&&THEMES.indexOf(saved)>-1&&saved!=="light"){document.documentElement.setAttribute("data-theme",saved);}function closeMenu(){var m=document.querySelector("[data-theme-menu]");if(m)m.classList.remove("is-open");var t=document.querySelector("[data-theme-toggle]");if(t)t.setAttribute("aria-expanded","false");}document.addEventListener("click",function(e){var toggle=e.target.closest("[data-theme-toggle]");var option=e.target.closest("[data-theme-option]");var menu=document.querySelector("[data-theme-menu]");if(toggle){var open=menu&&menu.classList.contains("is-open");if(menu)menu.classList.toggle("is-open",!open);toggle.setAttribute("aria-expanded",open?"false":"true");return;}if(option){var t=option.getAttribute("data-theme-option");if(t==="light")document.documentElement.removeAttribute("data-theme");else document.documentElement.setAttribute("data-theme",t);localStorage.setItem(KEY,t);closeMenu();return;}if(!e.target.closest("[data-theme-menu]"))closeMenu();});document.addEventListener("keydown",function(e){if(e.key==="Escape")closeMenu();});})();</script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Projects — Summit Industrial Construction</title>
  <link rel="icon" href="https://summit.us/wp-content/uploads/2022/04/cropped-favico-270x270.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="./site.js"></script>
  <script src="./image-slot.js"></script>
  <style>
    :root{--paper:#F5F3EE;--paper-rgb:245,243,238;--ink:#0F1113;--ink-rgb:15,17,19;--panel:#EAE6DD}
    :root[data-theme="dark"]{--paper:#0F1113;--paper-rgb:15,17,19;--ink:#F5F3EE;--ink-rgb:245,243,238;--panel:#15181B}
    :root[data-theme="blueprint"]{--paper:#0B1E33;--paper-rgb:11,30,51;--ink:#E8EEF5;--ink-rgb:232,238,245;--panel:#13294A}
    :root[data-theme="concrete"]{--paper:#D8D5CE;--paper-rgb:216,213,206;--ink:#2B2926;--ink-rgb:43,41,38;--panel:#C7C3BA}
    :root[data-theme="safety"]{--paper:#FFFFFF;--paper-rgb:255,255,255;--ink:#000000;--ink-rgb:0,0,0;--panel:#F0F0F0}
    :root[data-theme="steel"]{--paper:#3A3F44;--paper-rgb:58,63,68;--ink:#E4E7EA;--ink-rgb:228,231,234;--panel:#464C52}
    body{transition:background-color .25s ease,color .25s ease}
    [data-theme-menu]{display:none}
    [data-theme-menu].is-open{display:flex}
    [data-theme-option] .theme-check{opacity:0}
    :root:not([data-theme]) [data-theme-option="light"] .theme-check{opacity:1}
    :root[data-theme="dark"] [data-theme-option="dark"] .theme-check{opacity:1}
    :root[data-theme="blueprint"] [data-theme-option="blueprint"] .theme-check{opacity:1}
    :root[data-theme="concrete"] [data-theme-option="concrete"] .theme-check{opacity:1}
    :root[data-theme="safety"] [data-theme-option="safety"] .theme-check{opacity:1}
    :root[data-theme="steel"] [data-theme-option="steel"] .theme-check{opacity:1}
    html { scroll-behavior: smooth; }
    body { margin: 0; background: var(--paper); color: var(--ink); font-family: Archivo, sans-serif; -webkit-font-smoothing: antialiased; }
    ::selection { background: #FF5C1F; color: var(--paper); }
    a { color: var(--ink); text-decoration: none; }
    a:hover { color: #FF5C1F; }
    @media (max-width: 900px) { [data-grid-item] { grid-column: span 12 !important; } }
  </style>
</helmet>
<dc-import name="SiteHeader" hint-size="100%,74px"></dc-import>

<!-- HERO -->
<section data-screen-label="Projects hero" style="padding:calc(74px + clamp(60px,10vh,120px)) clamp(20px,4vw,64px) clamp(40px,6vh,72px);position:relative;overflow:hidden">
  <div style="position:absolute;right:-2vw;top:8vh;font-family:Anton,sans-serif;font-size:clamp(160px,28vw,420px);line-height:1;color:transparent;-webkit-text-stroke:1px rgba(var(--ink-rgb),.1);pointer-events:none">03</div>
  <div style="display:flex;align-items:baseline;gap:20px;margin-bottom:22px">
    <span style="font-family:Anton,sans-serif;font-size:clamp(40px,5vw,80px);color:transparent;-webkit-text-stroke:1px #FF5C1F;line-height:1">03</span>
    <span style="font-size:12px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:rgba(var(--ink-rgb),.6)">Projects</span>
  </div>
  <h1 style="margin:0;font-family:Anton,sans-serif;font-size:clamp(48px,8.5vw,140px);line-height:.94;text-transform:uppercase;max-width:14ch">
    <span style="display:block;overflow:hidden"><span data-reveal="mask" style="display:block">Proof, poured</span></span>
    <span style="display:block;overflow:hidden"><span data-reveal="mask" data-reveal-delay="0.12" style="display:block">and <span style="color:#FF5C1F">welded.</span></span></span>
  </h1>
</section>

<!-- FILTER BAR -->
<div data-screen-label="Filter bar" style="position:sticky;top:74px;z-index:100;background:rgba(var(--paper-rgb),.85);backdrop-filter:blur(12px);border-top:1px solid rgba(var(--ink-rgb),.1);border-bottom:1px solid rgba(var(--ink-rgb),.1);padding:0 clamp(20px,4vw,64px);display:flex;gap:clamp(18px,3vw,44px);overflow-x:auto">
  <sc-for list="{{ filters }}" as="f" hint-placeholder-count="5">
    <button onClick="{{ f.pick }}" style="position:relative;background:none;border:none;cursor:pointer;padding:18px 0;font-family:Archivo,sans-serif;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;white-space:nowrap;color:{{ f.color }};transition:color .3s">
      {{ f.label }}
      <span style="position:absolute;left:0;bottom:0;height:2px;width:100%;background:#FF5C1F;transform:{{ f.underline }};transform-origin:left;transition:transform .5s cubic-bezier(0.16,1,0.3,1)"></span>
    </button>
  </sc-for>
  <div style="margin-left:auto;align-self:center;font-size:11px;letter-spacing:.2em;color:rgba(var(--ink-rgb),.4);white-space:nowrap">{{ count }} PROJECTS</div>
</div>

<!-- GRID -->
<section data-screen-label="Project grid" style="padding:clamp(32px,5vh,64px) clamp(20px,4vw,64px) clamp(80px,12vh,140px)">
  <div style="display:grid;grid-template-columns:repeat(12,1fr);gap:clamp(16px,2vw,32px);align-items:start">
    <sc-for list="{{ projects }}" as="p" hint-placeholder-count="8">
      <a data-grid-item data-cursor-view data-hover-zoom href="{{ p.href }}" style="grid-column:{{ p.col }};display:block;color:var(--ink);margin-top:{{ p.offset }};opacity:{{ p.op }};transform:{{ p.tf }};transition:opacity .6s cubic-bezier(0.16,1,0.3,1),transform .7s cubic-bezier(0.16,1,0.3,1)">
        <div style="position:relative;overflow:hidden;aspect-ratio:{{ p.ratio }};background:var(--panel)">
          <div data-img style="position:absolute;inset:-8% 0"><div data-parallax="0.06" style="position:absolute;inset:0"><image-slot id="{{ p.slot }}" src="{{ p.src }}" shape="rect" placeholder="{{ p.ph }}"></image-slot></div></div>
          <div style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,transparent 60%,rgba(var(--paper-rgb),.8))"></div>
          <div style="position:absolute;left:16px;top:14px;font-family:Anton,sans-serif;font-size:34px;color:transparent;-webkit-text-stroke:1px rgba(var(--ink-rgb),.35);pointer-events:none">{{ p.idx }}</div>
          <div style="position:absolute;right:14px;top:14px;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--paper);background:#FF5C1F;padding:5px 10px;pointer-events:none">{{ p.industry }}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:16px;margin-top:14px;border-bottom:1px solid rgba(var(--ink-rgb),.12);padding-bottom:14px">
          <span style="font-family:Anton,sans-serif;font-size:clamp(17px,1.5vw,23px);text-transform:uppercase;letter-spacing:.02em;line-height:1.15">{{ p.name }}</span>
          <span style="font-size:12px;color:rgba(var(--ink-rgb),.55);letter-spacing:.06em;white-space:nowrap">{{ p.stat }}</span>
        </div>
      </a>
    </sc-for>
  </div>
</section>

<dc-import name="SiteFooter" hint-size="100%,600px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { filter: 'All', anim: 1 };
  pick(f) {
    if (f === this.state.filter) return;
    this.setState({ anim: 0 });
    setTimeout(() => this.setState({ filter: f, anim: 1 }), 60);
  }
  renderVals() {
    const all = [
      { idx: '01', slot: 'prj-phoenix', src: 'https://summit.us/wp-content/uploads/2022/03/21.004-TSMC-3.jpeg', name: 'Phoenix Semiconductor UG Infrastructure & AG Piping', industry: 'Semiconductor', stat: '480,000 LF pipe', col: 'span 7', ratio: '16/10', offset: '0', href: 'project-phoenix.dc.html', ph: 'Drop photo — UG utilities / fab site' },
      { idx: '02', slot: 'prj-foundation', src: 'https://summit.us/wp-content/uploads/2023/01/Eagle-Mod-Assembly-1.jpeg', name: 'Semiconductor Foundation & Trestle Erection', industry: 'Semiconductor', stat: '38,000 T steel', col: 'span 5', ratio: '4/5', offset: 'clamp(24px,6vh,80px)', href: 'project-phoenix.dc.html', ph: 'Drop photo — trestle steel at dawn' },
      { idx: '03', slot: 'prj-osm', src: 'https://summit.us/wp-content/uploads/2023/01/1.-OSM-Yard-61-Modular-Assembly.jpg', name: 'Semiconductor Modular Assembly — OSM Yard', industry: 'Semiconductor', stat: '48-acre yard', col: 'span 4', ratio: '4/5', offset: '0', href: 'project-phoenix.dc.html', ph: 'Drop photo — module assembly line' },
      { idx: '04', slot: 'prj-star', src: 'https://summit.us/wp-content/uploads/2023/01/22.006-Project-Star-CUB-Trestle-Modules.jpeg', name: 'Project Star Modular Trestles', industry: 'Semiconductor', stat: '212 modules set', col: 'span 8', ratio: '16/9', offset: 'clamp(16px,4vh,56px)', href: 'project-phoenix.dc.html', ph: 'Drop photo — trestle module lift' },
      { idx: '05', slot: 'prj-riorancho', src: 'https://summit.us/wp-content/uploads/2022/05/22.005-Project-Hedgehog-Rio-Rancho-03.jpg', name: 'Semiconductor Expansion — Rio Rancho', industry: 'Semiconductor', stat: '1.2M work hours', col: 'span 6', ratio: '3/2', offset: '0', href: 'project-phoenix.dc.html', ph: 'Drop photo — fab expansion exterior' },
      { idx: '06', slot: 'prj-grayoak', src: 'https://summit.us/wp-content/uploads/2022/03/4.-19.005-P66-Central-Three-Rivers.jpeg', name: 'Gray Oak Central Terminal', industry: 'Energy & Terminals', stat: '900,000 BBL', col: 'span 6', ratio: '3/2', offset: 'clamp(24px,6vh,80px)', href: 'project-phoenix.dc.html', ph: 'Drop photo — tank farm at dusk' },
      { idx: '07', slot: 'prj-hunter', src: 'https://summit.us/wp-content/uploads/2022/03/0_552547_2015-09-04-07-13-49-051.jpg', name: 'D.G. Hunter Power Plant Units 5–11', industry: 'Power', stat: '7 units', col: 'span 5', ratio: '4/5', offset: '0', href: 'project-phoenix.dc.html', ph: 'Drop photo — turbine hall' },
      { idx: '08', slot: 'prj-pinelands', src: 'https://summit.us/wp-content/uploads/2022/03/MAIN_3-07-18-13-scaled.jpg', name: 'Pinelands Biomass Facility', industry: 'Renewables', stat: '38 MW', col: 'span 7', ratio: '16/10', offset: 'clamp(16px,4vh,56px)', href: 'project-phoenix.dc.html', ph: 'Drop photo — biomass plant structure' }
    ];
    const f = this.state.filter;
    const shown = all.filter(p => f === 'All' || p.industry === f).map(p => ({
      ...p, op: this.state.anim ? '1' : '0', tf: this.state.anim ? 'translateY(0)' : 'translateY(30px)'
    }));
    return {
      filters: ['All', 'Semiconductor', 'Power', 'Energy & Terminals', 'Renewables'].map(label => ({
        label, pick: () => this.pick(label),
        color: label === f ? 'var(--ink)' : 'rgba(var(--ink-rgb),.45)',
        underline: label === f ? 'scaleX(1)' : 'scaleX(0)'
      })),
      projects: shown,
      count: String(shown.length).padStart(2, '0')
    };
  }
}
</script>
</body>
</html>
